repos:
  - repo: local
    hooks:
      - id: ruff
        name: ruff (Python linting)
        entry: ruff check --output-format=github
        language: system  
        files: \.py$
      - id: ruff-format
        name: ruff (Check format)
        entry: ruff format --check --diff
        language: system  
        files: \.py$