services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: eventuary-db-api-service
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: mysql+pymysql://app_user:app_password@db:3306/app_db
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./src/main:/src/main
    restart: unless-stopped

  db:
    image: mysql:latest
    container_name: eveutary-mysql
    environment:
      MYSQL_DATABASE: app_db
      MYSQL_USER: app_user
      MYSQL_PASSWORD: app_password
      MYSQL_ROOT_PASSWORD: root_password_change_me
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -uroot -p$$MYSQL_ROOT_PASSWORD || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    restart: unless-stopped

  adminer:
    image: adminer:latest
    container_name: eventuary-adminer
    ports:
      - "8080:8080"
    environment:
      ADMINER_DEFAULT_SERVER: db
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

volumes:
  mysql_data:
